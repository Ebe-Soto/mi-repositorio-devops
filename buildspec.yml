version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Instalando dependencias"
      - pip install --upgrade pip
      - pip install pytest
      - pip install -r app/requirements.txt

  build:
    commands:
      - echo "Ejecutando pruebas"
      - pytest app/

  post_build:
    commands:
      - echo "Build finalizado"
